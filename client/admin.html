<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamio Admin</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --orange: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 16px; font-weight: 600; }
    header a { margin-left: auto; color: var(--muted); text-decoration: none; font-size: 13px; }
    header a:hover { color: var(--text); }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    section { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    section h2 { padding: 12px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .btn { background: var(--border); border: none; color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn:hover { background: #3c4147; }
    .btn.danger { background: rgba(248,81,73,.15); color: var(--red); }
    .btn.danger:hover { background: rgba(248,81,73,.25); }
    .empty { padding: 24px; text-align: center; color: var(--muted); }
    .mono { font-family: monospace; font-size: 12px; color: var(--muted); }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 12px; font-size: 11px; font-weight: 500; background: var(--border); }
    .badge.admin { background: rgba(88,166,255,.15); color: var(--accent); }
  </style>
</head>
<body>
<header>
  <h1>Streamio Admin</h1>
  <a href="/auth/logout">Logout</a>
</header>
<main>

  <!-- Backends -->
  <section>
    <h2>Backends <span id="backend-count" class="badge"></span></h2>
    <table>
      <thead><tr><th>Status</th><th>Label</th><th>URL</th><th>ID</th></tr></thead>
      <tbody id="backends-tbody"><tr><td colspan="4" class="empty">Loading…</td></tr></tbody>
    </table>
  </section>

  <!-- User Assignments -->
  <section>
    <h2>User Assignments <span id="user-count" class="badge"></span></h2>
    <table>
      <thead><tr><th>User</th><th>Backend</th><th>Actions</th></tr></thead>
      <tbody id="users-tbody"><tr><td colspan="3" class="empty">Loading…</td></tr></tbody>
    </table>
  </section>

  <!-- Active Sessions -->
  <section>
    <h2>Active Sessions</h2>
    <table>
      <thead><tr><th>Backend</th><th>URL</th><th>Status</th></tr></thead>
      <tbody id="sessions-tbody"><tr><td colspan="3" class="empty">Loading…</td></tr></tbody>
    </table>
  </section>

</main>

<script>
const api = (path, opts) => fetch('/admin/api' + path, { headers: {'Content-Type':'application/json'}, ...opts }).then(r => r.json().catch(() => null));

function dot(healthy) {
  return `<span class="dot ${healthy ? 'green' : 'red'}"></span>${healthy ? 'Healthy' : 'Unhealthy'}`;
}

async function loadBackends() {
  const data = await api('/backends');
  const tbody = document.getElementById('backends-tbody');
  document.getElementById('backend-count').textContent = data.length;
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No backends registered</td></tr>'; return; }
  tbody.innerHTML = data.map(b => `
    <tr>
      <td>${dot(b.healthy)}</td>
      <td>${b.label || '<span class="muted">—</span>'}</td>
      <td class="mono">${b.url}</td>
      <td class="mono">${b.id}</td>
    </tr>`).join('');
}

async function loadUsers() {
  const [users, backends] = await Promise.all([api('/users'), api('/backends')]);
  const tbody = document.getElementById('users-tbody');
  document.getElementById('user-count').textContent = users.length;
  if (!users.length) { tbody.innerHTML = '<tr><td colspan="3" class="empty">No assignments</td></tr>'; return; }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td class="mono">${u.user_sub}</td>
      <td>${u.backend_label || u.backend_id || '—'}</td>
      <td>
        <button class="btn danger" onclick="deleteAssignment('${u.user_sub}')">Remove</button>
      </td>
    </tr>`).join('');
}

async function loadSessions() {
  const data = await api('/sessions');
  const tbody = document.getElementById('sessions-tbody');
  if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="3" class="empty">No sessions</td></tr>'; return; }
  tbody.innerHTML = data.map(s => `
    <tr>
      <td class="mono">${s.backend_id}</td>
      <td class="mono">${s.backend_url}</td>
      <td>${dot(s.active)}</td>
    </tr>`).join('');
}

async function deleteAssignment(sub) {
  if (!confirm(`Remove assignment for ${sub}?`)) return;
  await fetch('/admin/api/assignments/' + encodeURIComponent(sub), { method: 'DELETE' });
  loadUsers();
}

async function refresh() {
  await Promise.all([loadBackends(), loadUsers(), loadSessions()]);
}

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
