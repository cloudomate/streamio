# RBAC for streamio-gateway to manage KubeVirt VMs and CDI DataVolumes.
# Apply with: kubectl apply -f deploy/kubevirt-rbac.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: streamio-gateway
  namespace: vdi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: streamio-gateway
rules:
  # KubeVirt VMs and VMIs
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CDI DataVolumes (clones base image PVCs per user)
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # PVCs (read + delete for cleanup)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: streamio-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: streamio-gateway
subjects:
  - kind: ServiceAccount
    name: streamio-gateway
    namespace: vdi
